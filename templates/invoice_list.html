{% extends 'base.html' %}
{% block content %}
<h1>Накладные</h1>
<table class="table">
    <thead>
        <tr><th>Номер</th><th>Поставщик</th><th>Дата</th><th></th></tr>
    </thead>
    <tbody>
        {% for invoice in invoices %}
            <tr>
                <td>{{ invoice.number }}</td>
                <td>{{ invoice.supplier }}</td>
                <td>{{ invoice.date }}</td>
                <td><a href="{% url 'invoice_detail' invoice.pk %}" class="btn btn-sm btn-primary">Просмотр</a></td>
            </tr>
        {% empty %}
            <tr><td colspan="4">Нет накладных</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
